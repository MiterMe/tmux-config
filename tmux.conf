# Tmux 配置
# 从 wezterm 迁移 - 使用直接按键模式

# ============================================
# 基础设置
# ============================================
# 索引从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 鼠标支持
set -g mouse on

# 历史记录
set -g history-limit 10000

# 终端颜色支持 (适配 kitty)
set -g default-terminal "xterm-kitty"
set -ag terminal-overrides ",xterm-kitty:RGB"

# 启用 kitty 键盘协议支持
set -s extended-keys on
set -as terminal-features ",xterm-kitty:extkeys"

# 减少 ESC 延迟
set -sg escape-time 0

# 重新编号窗口（关闭窗口后）
set -g renumber-windows on

# ============================================
# 剪贴板设置 (Wayland)
# ============================================
# 使用 wl-clipboard
set -s copy-command 'wl-copy'

# 复制模式绑定
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'wl-copy'

# 从系统剪贴板粘贴 (Prefix + v 或直接绑定)
bind v run "wl-paste | tmux load-buffer - ; tmux paste-buffer"

# ============================================
# 移除默认 prefix 键
# ============================================
unbind C-b
set -g prefix M-B

# ============================================
# Window (Tab) 操作
# ============================================
# Shift+Alt+T 新建窗口 (M-T = Alt+Shift+T)
bind -n M-T new-window

# Alt+H 上一个窗口
bind -n M-h previous-window

# Alt+L 下一个窗口
bind -n M-l next-window

# ============================================
# Pane 操作
# ============================================
# Shift+Alt+N 右侧新建 pane (M-N = Alt+Shift+N)
bind -n M-N split-window -h -c "#{pane_current_path}"

# Shift+Alt+P 右侧新建 pane (M-P = Alt+Shift+P, 水平分割)
bind -n M-P split-window -h -c "#{pane_current_path}"

# Shift+Alt+D 下方新建 pane (M-D = Alt+Shift+D, 垂直分割)
bind -n M-D split-window -v -c "#{pane_current_path}"

# Shift+Alt+H/J/K/L 切换 pane (M-H/J/K/L = Alt+Shift+H/J/K/L)
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R

# Shift+Alt+方向键 调整 pane 大小
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# ============================================
# Session 操作 (键表模式)
# ============================================
# Shift+Alt+O 进入 session 模式 (M-O = Alt+Shift+O)
bind -n M-O switch-client -T session_mode

# Session 模式快捷键
bind -T session_mode s choose-session
bind -T session_mode d detach-client
bind -T session_mode n command-prompt -p "Session name:" "new-session -s '%%'"
bind -T session_mode Escape switch-client -Troot

# ============================================
# Copy 模式
# ============================================
# Shift+Alt+X 进入 copy 模式 (M-X = Alt+Shift+X)
bind -n M-X copy-mode

# 使用 vi 模式
setw -g mode-keys vi

# Copy 模式下的 vim 风格绑定
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# ============================================
# Everforest 主题
# ============================================
# 背景和前景
set -g status-style "bg=#323d43,fg=#d8caac"

# 当前窗口状态
set -g window-status-current-style "bg=#4d5960,fg=#d8caac,bold"
set -g window-status-current-format " #[fg=#a7c080]#{window_index}#[fg=#d8caac]:#{window_name} "

# 其他窗口状态
set -g window-status-style "bg=#323d43,fg=#868d80"
set -g window-status-format " #[fg=#868d80]#{window_index}:#{window_name} "

# Pane 边框
set -g pane-border-style "fg=#505a60"
set -g pane-active-border-style "fg=#a7c080"

# 消息样式
set -g message-style "bg=#4d5960,fg=#d8caac"
set -g message-command-style "bg=#4d5960,fg=#d8caac"

# 模式样式 (选择列表等)
set -g mode-style "bg=#505a60,fg=#d8caac"

# 状态栏左侧
set -g status-left ""
set -g status-left-length 0

# 状态栏右侧
set -g status-right " #[fg=#a7c080]#{session_name} #[fg=#868d80]%H:%M "
set -g status-right-length 50

# ============================================
# 状态栏位置
# ============================================
set -g status-position top

# ============================================
# 窗口标题设置
# ============================================
# 启用窗口标题更新
set -g set-titles on
set -g set-titles-string "#{session_name}"
