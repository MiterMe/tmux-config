# Tmux 配置
# 从 wezterm 迁移 - 使用直接按键模式

# ============================================
# 基础设置
# ============================================
# 索引从 1 开始
set -g base-index 1
setw -g pane-base-index 1

# 鼠标支持
set -g mouse on

# 历史记录
set -g history-limit 10000

# 减少 ESC 延迟
set -sg escape-time 0

# 重新编号窗口（关闭窗口后）
set -g renumber-windows on

# 把 Ctrl+D 从“退出shell”改成“分离tmux”
bind-key -n C-d detach-client
set -g destroy-unattached off


# ============================================
# 剪贴板设置 (Wayland)
# ============================================
# 使用 wl-clipboard
set -s copy-command 'wl-copy'

# 复制模式绑定
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'wl-copy'

# 从系统剪贴板粘贴 (Prefix + v 或直接绑定)
bind v run "wl-paste | tmux load-buffer - ; tmux paste-buffer"

# ============================================
# 移除默认 prefix 键
# ============================================
unbind C-b
set -g prefix M-B

# ============================================
# Window (Tab) 操作
# ============================================
# Shift+Alt+T 新建窗口 (M-T = Alt+Shift+T)
bind -n M-T new-window

# Alt+H 上一个窗口
bind -n M-h previous-window

# Alt+L 下一个窗口
bind -n M-l next-window

# ============================================
# Pane 操作
# ============================================
# Shift+Alt+P 右侧新建 pane (M-P = Alt+Shift+P, 水平分割)
bind -n M-P split-window -h -c "#{pane_current_path}"

# Shift+Alt+D 下方新建 pane (M-D = Alt+Shift+D, 垂直分割)
bind -n M-D split-window -v -c "#{pane_current_path}"

# Shift+Alt+H/J/K/L 切换 pane (M-H/J/K/L = Alt+Shift+H/J/K/L)
bind -n M-H select-pane -L
bind -n M-J select-pane -D
bind -n M-K select-pane -U
bind -n M-L select-pane -R

# Shift+Alt+方向键 调整 pane 大小
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# ============================================
# Session 操作 (键表模式)
# ============================================
# Shift+Alt+O 进入 session 模式 (M-O = Alt+Shift+O)
bind -n M-O switch-client -T session_mode

# Session 模式快捷键
bind -T session_mode s choose-session
bind -T session_mode d detach-client
bind -T session_mode n command-prompt -p "Session name:" "new-session -s '%%'"
bind -T session_mode Escape switch-client -Troot

# ============================================
# Copy 模式
# ============================================
# Shift+Alt+X 进入 copy 模式 (M-X = Alt+Shift+X)
bind -n M-X copy-mode

# 使用 vi 模式
setw -g mode-keys vi

# Copy 模式下的 vim 风格绑定
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# ============================================
# 状态栏位置
# ============================================
set -g status-position top

# ============================================
# 窗口标题设置
# ============================================
# 启用窗口标题更新
set -g set-titles on
set -g set-titles-string "#{session_name}"

set -g allow-passthrough on
set -g default-terminal "tmux-256color"
set -as terminal-features ",wezterm:24bit"
set -as terminal-overrides ',wezterm*:Tc'
# # 终端颜色支持 (kitty)
# set -g default-terminal "xterm-kitty"
# # 终端颜色支持 (Alacritty)
# set -g default-terminal "alacritty"
# # 终端颜色支持 (WezTerm)
# set -g default-terminal "wezterm"
# 强制开启Ture Color
